# Runs only notification-service on the external Docker network shared with ``event-platform-infra``.
#
# Prerequisites: broker already up (``cd event-platform-infra && docker compose up -d``).
# Recommended order when testing retries (Day 7): infra → retry-orchestrator-service → this service → gateway-api.
#
# Requires ``.env`` (copy from ``.env.example``). Compose sets ``RABBITMQ_HOST=rabbitmq``.

services:
  notification:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-platform-notification-service
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    restart: unless-stopped
    networks:
      - event-platform

networks:
  event-platform:
    external: true
    name: ${EVENT_PLATFORM_NETWORK_NAME}
